name: Testbed Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    env:
      TESTBED_MANAGE_ENV: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TESTBED_OPENAI_MODEL: ${{ vars.TESTBED_OPENAI_MODEL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TESTBED_ANTHROPIC_MODEL: ${{ vars.TESTBED_ANTHROPIC_MODEL }}
      TESTBED_OPENAI_COMPAT_BASE_URL: ${{ vars.TESTBED_OPENAI_COMPAT_BASE_URL }}
      TESTBED_OPENAI_COMPAT_API_KEY: ${{ secrets.TESTBED_OPENAI_COMPAT_API_KEY }}
      TESTBED_OPENAI_COMPAT_MODEL: ${{ vars.TESTBED_OPENAI_COMPAT_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python -m testbed.runners.run_suite nightly
