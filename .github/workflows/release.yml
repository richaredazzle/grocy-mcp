name: Release to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  testbed_release:
    runs-on: ubuntu-latest
    env:
      TESTBED_MANAGE_ENV: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TESTBED_OPENAI_MODEL: ${{ vars.TESTBED_OPENAI_MODEL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TESTBED_ANTHROPIC_MODEL: ${{ vars.TESTBED_ANTHROPIC_MODEL }}
      TESTBED_OPENAI_COMPAT_BASE_URL: ${{ vars.TESTBED_OPENAI_COMPAT_BASE_URL }}
      TESTBED_OPENAI_COMPAT_API_KEY: ${{ secrets.TESTBED_OPENAI_COMPAT_API_KEY }}
      TESTBED_OPENAI_COMPAT_MODEL: ${{ vars.TESTBED_OPENAI_COMPAT_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python -m testbed.runners.run_suite release

  publish:
    runs-on: ubuntu-latest
    needs: testbed_release
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
